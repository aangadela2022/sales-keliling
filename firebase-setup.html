<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Database - Sales Keliling</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
        }
        .config-card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .config-card h2 {
            margin-bottom: 5px;
            color: var(--primary-color);
            text-align: center;
        }
        .config-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        textarea.form-control {
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        .error-msg {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="config-card">
        <h2>Setup Database Firebase</h2>
        <p>Aplikasi ini menyimpan data secara lokal dan menyalinnya ke cloud. Masukkan konfigurasi JSON Firebase Anda.</p>
        <div class="error-msg" id="errorMsg">Format konfigurasi JSON tidak valid!</div>
        <form id="configForm">
            <div class="form-group">
                <label for="firebaseConfig">Firebase Config Object (JSON):</label>
                <textarea id="firebaseConfig" class="form-control" rows="8" placeholder='{
  "apiKey": "AIzaSy...",
  "authDomain": "...",
  "projectId": "...",
  "storageBucket": "...",
  "messagingSenderId": "...",
  "appId": "..."
}' required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Simpan Konfigurasi</button>
            <button type="button" class="btn" style="background-color: var(--secondary-color); width: 100%; margin-top: 10px;" onclick="window.location.href='index.html'">Lanjutkan Tanpa Cloud (Local Only)</button>
        </form>
    </div>

    <script>
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const configText = document.getElementById('firebaseConfig').value;
            
            try {
                let configObj;
                try {
                    // Coba parsing JSON murni
                    configObj = JSON.parse(configText);
                } catch {
                    // Jika gagal (karena format js mentah dari firebase), gunakan REGEX murni tanpa EVAL
                    const match = configText.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error("Tidak menemukan kurung kurawal pembuka/penutup");
                    
                    let cleanText = match[0];
                    // Tambahkan tanda kutip ganda ke Key yang belum dikuotasi
                    cleanText = cleanText.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":');
                    // Ganti kutipan tunggal (single quote) ke double quote
                    cleanText = cleanText.replace(/'/g, '"');
                    // Buang tanda koma gantung di ujung (trailing comma) yang merusak JSON
                    cleanText = cleanText.replace(/,\s*\}/g, '}');
                    
                    configObj = JSON.parse(cleanText);
                }
                
                if (!configObj || !configObj.apiKey || !configObj.projectId) {
                    throw new Error("Missing fields");
                }
                
                localStorage.setItem('firebaseConfig', JSON.stringify(configObj));
                alert("Konfigurasi berhasil disimpan!");
                window.location.href = 'index.html';
                
            } catch (err) {
                console.error(err);
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
