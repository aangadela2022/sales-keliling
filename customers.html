<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelanggan - Sales Keliling</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <button class="nav-toggle" onclick="toggleSidebar()">☰</button>
        <h1>Pelanggan</h1>
        <div style="width: 30px;"></div>
    </header>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">×</a>
        <a href="index.html">Dashboard & Profil</a>
        <a href="customers.html" class="active">Pelanggan</a>
        <a href="map.html">Peta Kunjungan</a>
        <a href="suppliers.html">Suplier</a>
        <a href="products.html">Produk</a>
        <a href="purchases.html">Pembelian</a>
        <a href="order.html">Order</a>
        <a href="payment.html">Pembayaran</a>
        <a href="debt.html">Rekap Hutang</a>
        <a href="sales_report.html">Laporan Penjualan</a>
        <a href="ranking.html">Ranking Pelanggan</a>
        <a href="chart.html">Grafik Penjualan</a>
        <div style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px;"></div>
        <a href="#" onclick="logout()" style="color: #ea4335; font-weight: bold;">🚪 Logout</a>
    </div>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Data Pelanggan</h2>
            <button class="btn btn-success" style="width: auto; margin: 0;" onclick="toggleForm('customerFormCard')">+ Tambah Pelanggan</button>
        </div>

        <div class="form-card" id="customerFormCard" style="display: none;">
            <h3>Tambah Pelanggan Baru</h3>
            <form id="customerForm">
                <input type="hidden" id="customerId">
                <div class="form-group">
                    <label for="custName">Nama Toko *</label>
                    <input type="text" id="custName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="custOwner">Nama Pemilik *</label>
                    <input type="text" id="custOwner" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="custPhone">No HP *</label>
                    <input type="text" id="custPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="custAddress">Alamat *</label>
                    <textarea id="custAddress" class="form-control" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="btnSaveCustomer">Simpan Pelanggan</button>
                <button type="button" class="btn" style="background-color: var(--secondary-color); border-color: var(--border-color); color: var(--text-color);" onclick="toggleForm('customerFormCard')">Tutup</button>
            </form>
        </div>

        <div class="table-responsive">
            <h3>Daftar Pelanggan</h3>
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama Toko</th>
                        <th>Pemilik</th>
                        <th>HP</th>
                        <th>Alamat</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/firebase-sync.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/customer.js"></script>
</body>
</html>
